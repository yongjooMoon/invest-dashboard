name: Quant Investment Auto Trading (Batch)

on:
  schedule:
    # 한국시간 오후 14:30 실행 -> UTC 05:30
    - cron: '30 5 * * *'

  # 수동 실행 버튼
  workflow_dispatch: 

jobs:
  run-quant-batch:
    runs-on: ubuntu-latest

    steps:
    - name: 1. 저장소 소스코드 복사 (Checkout)
      uses: actions/checkout@v3

    - name: 2. 파이썬 환경 세팅
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: 3. 필수 라이브러리 설치
      # quant_cron.py 및 quant_core.py 구동에 필요한 라이브러리들
      run: |
        python -m pip install --upgrade pip
        pip install pandas requests supabase finance-datareader bs4 lxml plotly

    - name: 4. 🚀 퀀트 자동매매 스크립트 실행
      # quant_cron.py 내부에 os.environ.get()으로 설정된 환경변수들을 GitHub Secrets에서 주입합니다.
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
        KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
        KIS_BASE_URL: ${{ secrets.KIS_BASE_URL }}
        DART_API_KEY: ${{ secrets.DART_API_KEY }}
      run: python quant_cron.py
